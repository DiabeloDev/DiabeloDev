<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Główna</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: blue;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Witamy na Stronie Głównej</h1>
    <p>Lista linków:</p>

    <ul id="linki">
        <li><a href="https://chatgpt.com/" target="_blank">ChatGPT</a></li>
        <li><a href="https://github.com/" target="_blank">GitHub</a></li>
    </ul>

    <input type="text" id="nowyLink" placeholder="Wpisz URL">
    <input type="text" id="nazwaLinku" placeholder="Wpisz nazwę">
    <button onclick="dodajLink()">Dodaj link</button>

    <script>
        function dodajLink() {
            let url = document.getElementById("nowyLink").value;
            let nazwa = document.getElementById("nazwaLinku").value;
            if (url && nazwa) {
                let lista = document.getElementById("linki");
                let nowyElement = document.createElement("li");
                let nowyLink = document.createElement("a");

                nowyLink.href = url;
                nowyLink.textContent = nazwa;
                nowyLink.target = "_blank";

                nowyElement.appendChild(nowyLink);
                lista.appendChild(nowyElement);

                document.getElementById("nowyLink").value = "";
                document.getElementById("nazwaLinku").value = "";
            } else {
                alert("Wypełnij oba pola!");
            }
        }
    </script>

</body>
</html>
